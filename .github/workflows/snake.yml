name: Generate Snake

on:
  # প্রতি ২৪ ঘণ্টায় একবার অটোমেটিক আপডেট হবে
  schedule:
    - cron: "0 0 * * *" 
  
  # আপনাকে ম্যানুয়ালি রান করার পারমিশন দেবে
  workflow_dispatch:
  
  # প্রতিবার মেইন ব্রাঞ্চে পুশ করলে রান হবে
  push:
    branches:
      - master
      - main
jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      # GitHub contribution grid snake generation
      - name: generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
          
      # ডিস্ট্রিবিউশন ডিরেক্টরি থেকে ফাইল আউটপুট ব্রাঞ্চে পুশ করা
      - name: push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v4.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
